name: Keep Supabase alive

on:
  schedule:
    - cron: '0 9 */4 * *'  # toutes les 4 jours à 9h UTC
  workflow_dispatch:        # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/domains?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}")
          echo "Statut HTTP : $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Erreur : Supabase n'a pas répondu correctement"
            exit 1
          fi
          echo "Supabase est actif"
